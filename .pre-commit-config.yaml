# Install locally: pip install pre-commit && pre-commit install
# Runs on `git commit`; ruff auto-fixes staged Python files then formats them.
# CI re-checks the same rules in the lint job — pre-commit keeps CI green.

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
